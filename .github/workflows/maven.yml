name: Selenium Tests CI

on:
  push:
    branches: [ "main" ] # Run for every push
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest #Run on ubuntu

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests with Maven
        run: mvn test #To run tests

      - name: Upload Report
        if: always() # Upload reporter even when tests fail
        uses: actions/upload-artifact@v4
        with:
          name: execution-report
          path: reports/ #PATH for reports